# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER
$hyper = MOD3

bind = $hyper, Return, exec, $terminal
bind = $hyper, Backspace, killactive,
bind = $mainMod, E, exec, $fileManager

# launcher
bind = ALT, SPACE, exec, wofi --show drun
bind = CTRL_SHIFT, m, exec, $powermenu

# --- Window Manipulation ---
# Swapping windows
bind = $hyper, bracketleft,  swapwindow, l
bind = $hyper, bracketright, swapwindow, r
bind = $hyper, equal,        swapwindow, u
bind = $hyper, apostrophe,   swapwindow, d

# Toggle Fullscreen / Floating / Sticky
bind = $hyper, Q, fullscreen, 1
bind = $hyper, Space, togglefloating,
# drag with left click
bindm = SUPER, mouse:272, movewindow
# resize with right click
bindm = SUPER, mouse:273, resizewindow

# Split configuration
bind = $hyper, R, layoutmsg, swapsplit
bind = $hyper, T, layoutmsg, togglesplit

# Window Rotation & Mirroring (Dwindle equivalents)
bind = $hyper, R, layoutmsg, togglesplit
bind = $hyper, V, layoutmsg, preselect d
bind = $hyper, H, layoutmsg, preselect r

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- Workspace Management ---
# Focus Workspace (Hyper + 1-9)
bind = $hyper, 1, workspace, 1
bind = $hyper, 2, workspace, 2
bind = $hyper, 3, workspace, 3
bind = $hyper, 4, workspace, 4
bind = $hyper, 5, workspace, 5
bind = $hyper, 6, workspace, 6
bind = $hyper, 7, workspace, 7
bind = $hyper, 8, workspace, 8
bind = $hyper, 9, workspace, 9

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move Window to Workspace (Alt + Cmd + 1-9)
bind = ALT_SUPER, 1, movetoworkspace, 1
bind = ALT_SUPER, 2, movetoworkspace, 2
bind = ALT_SUPER, 3, movetoworkspace, 3
bind = ALT_SUPER, 4, movetoworkspace, 4
bind = ALT_SUPER, 5, movetoworkspace, 5
bind = ALT_SUPER, 6, movetoworkspace, 6
bind = ALT_SUPER, 7, movetoworkspace, 7
bind = ALT_SUPER, 8, movetoworkspace, 8
bind = ALT_SUPER, 9, movetoworkspace, 9

# Move Window to Monitor (Ctrl + Cmd + 1-3)
bind = CTRL_SUPER, 1, movewindow, mon:0
bind = CTRL_SUPER, 2, movewindow, mon:1
bind = CTRL_SUPER, 3, movewindow, mon:2

# --- Multimedia keys and other functions ---
# Multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
# bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
# bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
# bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# --- AltTab behavior ---
#https://wiki.hypr.land/Configuring/Uncommon-tips--tricks/#alt-tab-behaviour
bind = ALT, TAB, exec, $HOME/.config/hypr/scripts/alttab/enable.sh 'down'
bind = ALT SHIFT, TAB, exec, $HOME/.config/hypr/scripts/alttab/enable.sh 'up'

submap=alttab
bind = ALT, tab, sendshortcut, , tab, class:alttab
bind = ALT SHIFT, tab, sendshortcut, shift, tab, class:alttab

bindrt = ALT, ALT_L, exec, $HOME/.config/hypr/scripts/alttab/disable.sh ; hyprctl -q dispatch sendshortcut , return,class:alttab
bindrt = ALT SHIFT, ALT_L, exec, $HOME/.config/hypr/scripts/alttab/disable.sh ; hyprctl -q dispatch sendshortcut , return,class:alttab
bind = ALT, Return, exec, $HOME/.config/hypr/scripts/alttab/disable.sh ; hyprctl -q dispatch sendshortcut , return, class:alttab
bind = ALT SHIFT, Return, exec, $HOME/.config/hypr/scripts/alttab/disable.sh ; hyprctl -q dispatch sendshortcut , return, class:alttab
bind = ALT, escape, exec, $HOME/.config/hypr/scripts/alttab/disable.sh ; hyprctl -q dispatch sendshortcut , escape,class:alttab
bind = ALT SHIFT, escape, exec, $HOME/.config/hypr/scripts/alttab/disable.sh ; hyprctl -q dispatch sendshortcut , escape,class:alttab
submap = reset
